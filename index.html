<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A secure, beautiful password generator">
    <title>Secure Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Clean Black, White, and Orange Palette */
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --card-border: #2a2a2a;
            
            --primary: #f97316; /* Clean orange */
            --primary-hover: #ea580c;
            
            --text-main: #f5f5f5;
            --text-muted: #888888;
            
            --input-bg: #1a1a1a;
            --slider-track: #333333;
            
            /* Strength Colors */
            --strength-weak: #ef4444;    /* Red */
            --strength-medium: #eab308;  /* Yellow */
            --strength-strong: #22c55e;  /* Green */
            
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --font-heavy: 'Druk Heavy', 'Archivo Black', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .generator-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 3rem;
            width: 100%;
            max-width: 540px;
        }

        .title {
            font-family: var(--font-heavy);
            font-size: 2.5rem;
            font-weight: 400;
            text-transform: uppercase;
            text-align: left;
            margin-bottom: 2rem;
            color: #ffffff;
            letter-spacing: 0.02em;
        }

        /* Output Section */
        .output-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .output-box {
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 1.25rem 4rem 1.25rem 1.25rem;
            min-height: 4rem;
            display: flex;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 500;
            color: #ffffff;
            word-break: break-all;
            line-height: 1.4;
            transition: border-color 0.2s ease;
        }

        .output-box:hover, .output-box:focus {
            border-color: var(--text-muted);
        }

        .output-box.placeholder {
            color: var(--text-muted);
            font-family: var(--font-ui);
            font-size: 1rem;
        }

        .copy-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background-color: #222222;
            border: 1px solid var(--card-border);
            border-radius: 4px;
            color: var(--text-main);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: var(--card-border);
            color: var(--primary);
        }

        .copy-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        .copy-btn svg {
            width: 18px;
            height: 18px;
        }

        .copy-feedback {
            position: absolute;
            right: 3.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
        }

        .copy-feedback.show {
            opacity: 1;
            transform: translateY(-50%) translateX(-8px);
        }

        /* Strength Indicator */
        .strength-container {
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .strength-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .strength-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .strength-text {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s ease;
        }

        .strength-bars {
            display: flex;
            gap: 4px;
            height: 6px;
        }

        .strength-bars .bar {
            flex: 1;
            background-color: var(--card-border);
            border-radius: 3px;
            transition: background-color 0.3s ease;
        }

        /* Controls: Length Slider */
        .control-group {
            margin-bottom: 2rem;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .control-header label {
            font-weight: 500;
            font-size: 1rem;
        }

        .length-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: var(--slider-track);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Controls: Checkboxes */
        .checkboxes {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            user-select: none;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .checkbox-label:hover {
            color: #fff;
        }

        .checkbox-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkbox {
            height: 20px;
            width: 20px;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .checkbox-label:hover input ~ .custom-checkbox {
            border-color: var(--text-muted);
        }

        .checkbox-label input:checked ~ .custom-checkbox {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .checkmark {
            color: #ffffff;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .checkbox-label input:checked ~ .custom-checkbox .checkmark {
            opacity: 1;
            transform: scale(1);
        }

        /* Validation Message */
        .validation-message {
            color: var(--strength-weak);
            font-size: 0.85rem;
            text-align: left;
            min-height: 1.25rem;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.2s ease;
        }

        .validation-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 1.25rem;
            font-size: 1.5rem;
            font-weight: 400;
            font-family: var(--font-heavy);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        .generate-btn:hover {
            background-color: var(--primary-hover);
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        .generate-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .generate-btn:hover svg {
            transform: rotate(180deg);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .generator-card {
                padding: 1.5rem;
            }
            .output-box {
                font-size: 1.1rem;
                padding: 1rem 3.5rem 1rem 1rem;
            }
        }
    </style>
</head>
<body>

    <main class="generator-card">
        <h1 class="title">Password Generator</h1>

        <!-- Output Area -->
        <div class="output-wrapper">
            <div id="password-output" class="output-box placeholder">Click Generate...</div>
            <span id="copy-feedback" class="copy-feedback">Copied!</span>
            <button id="copy-btn" class="copy-btn" aria-label="Copy to Clipboard">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
            </button>
        </div>

        <!-- Strength Indicator -->
        <div class="strength-container">
            <div class="strength-header">
                <span class="strength-label">Strength</span>
                <span id="strength-text" class="strength-text">-</span>
            </div>
            <div class="strength-bars" id="strength-bars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-group">
            <div class="control-header">
                <label for="length-slider">Character Length</label>
                <span id="length-val" class="length-value">16</span>
            </div>
            <input type="range" id="length-slider" class="slider" min="8" max="64" value="16">
        </div>

        <div class="checkboxes">
            <label class="checkbox-label">
                <input type="checkbox" id="uppercase" checked>
                <div class="custom-checkbox">
                    <svg class="checkmark" width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 5L5 9L13 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                Include Uppercase Letters
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="lowercase" checked>
                <div class="custom-checkbox">
                    <svg class="checkmark" width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 5L5 9L13 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                Include Lowercase Letters
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="numbers" checked>
                <div class="custom-checkbox">
                    <svg class="checkmark" width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 5L5 9L13 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                Include Numbers
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="symbols" checked>
                <div class="custom-checkbox">
                    <svg class="checkmark" width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 5L5 9L13 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                Include Symbols
            </label>
        </div>

        <div id="validation-msg" class="validation-message">Please select at least one character type.</div>

        <button id="generate-btn" class="generate-btn">
            Generate 
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </main>

    <script>
        // DOM Elements
        const passwordOutput = document.getElementById('password-output');
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        
        const chkUppercase = document.getElementById('uppercase');
        const chkLowercase = document.getElementById('lowercase');
        const chkNumbers = document.getElementById('numbers');
        const chkSymbols = document.getElementById('symbols');
        
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyFeedback = document.getElementById('copy-feedback');
        
        const validationMsg = document.getElementById('validation-msg');
        
        const strengthText = document.getElementById('strength-text');
        const strengthBars = document.querySelectorAll('#strength-bars .bar');

        // Character Sets
        const chars = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        // Initialize state
        let currentPassword = '';

        // Update slider value
        lengthSlider.addEventListener('input', (e) => {
            lengthVal.textContent = e.target.value;
            generatePassword(); 
        });

        // Add event listeners to checkboxes for auto-generation
        const checkboxes = [chkUppercase, chkLowercase, chkNumbers, chkSymbols];
        checkboxes.forEach(chk => {
            chk.addEventListener('change', generatePassword);
        });

        // Copy to clipboard
        let copyTimeout;
        copyBtn.addEventListener('click', async () => {
            if (!currentPassword) return;
            
            try {
                await navigator.clipboard.writeText(currentPassword);
                copyFeedback.classList.add('show');
                clearTimeout(copyTimeout);
                copyTimeout = setTimeout(() => {
                    copyFeedback.classList.remove('show');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
        });

        // Generate Password Main Logic
        function generatePassword() {
            let possibleChars = '';
            let typesSelected = 0;
            const length = parseInt(lengthSlider.value);
            
            if (chkUppercase.checked) { possibleChars += chars.uppercase; typesSelected++; }
            if (chkLowercase.checked) { possibleChars += chars.lowercase; typesSelected++; }
            if (chkNumbers.checked) { possibleChars += chars.numbers; typesSelected++; }
            if (chkSymbols.checked) { possibleChars += chars.symbols; typesSelected++; }

            // Validation
            if (typesSelected === 0) {
                validationMsg.classList.add('show');
                passwordOutput.textContent = 'Click Generate...';
                passwordOutput.classList.add('placeholder');
                currentPassword = '';
                strengthText.textContent = '-';
                strengthText.style.color = 'var(--text-muted)';
                strengthBars.forEach(bar => {
                    bar.style.backgroundColor = 'var(--card-border)';
                    bar.style.boxShadow = 'none';
                });
                return;
            }
            
            validationMsg.classList.remove('show');

            // Generation
            let password = '';
            
            // Ensure at least one char of each selected type is included
            const guaranteedChars = [];
            if (chkUppercase.checked) guaranteedChars.push(chars.uppercase[Math.floor(Math.random() * chars.uppercase.length)]);
            if (chkLowercase.checked) guaranteedChars.push(chars.lowercase[Math.floor(Math.random() * chars.lowercase.length)]);
            if (chkNumbers.checked) guaranteedChars.push(chars.numbers[Math.floor(Math.random() * chars.numbers.length)]);
            if (chkSymbols.checked) guaranteedChars.push(chars.symbols[Math.floor(Math.random() * chars.symbols.length)]);

            // Fill the rest with random chars from all selected
            for (let i = 0; i < length - guaranteedChars.length; i++) {
                const randomIndex = Math.floor(Math.random() * possibleChars.length);
                password += possibleChars[randomIndex];
            }

            // Shuffle the guaranteed chars into the password
            const passwordArray = password.split('').concat(guaranteedChars);
            for (let i = passwordArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [passwordArray[i], passwordArray[j]] = [passwordArray[j], passwordArray[i]];
            }
            
            currentPassword = passwordArray.join('');
            
            // Display
            passwordOutput.textContent = currentPassword;
            passwordOutput.classList.remove('placeholder');

            // Calculate and display strength
            updateStrengthIndicator(length, typesSelected);
        }

        function updateStrengthIndicator(length, types) {
            let strength = '';
            let barCount = 0;
            let color = '';

            // Strength Calculation Rules
            if (length < 10 || types === 1) {
                strength = 'Weak';
                barCount = 1;
                color = 'var(--strength-weak)';
            } else if (length >= 14 && types >= 3) {
                strength = 'Strong';
                barCount = 4;
                color = 'var(--strength-strong)';
            } else if (length >= 10 && types >= 2) {
                strength = 'Medium';
                barCount = 3;
                color = 'var(--strength-medium)';
            } else {
                strength = 'Weak';
                barCount = 1;
                color = 'var(--strength-weak)';
            }

            // Update UI
            strengthText.textContent = strength;
            strengthText.style.color = color;

            strengthBars.forEach((bar, index) => {
                if (index < barCount) {
                    bar.style.backgroundColor = color;
                    bar.style.boxShadow = 'none';
                } else {
                    bar.style.backgroundColor = 'var(--card-border)';
                    bar.style.boxShadow = 'none';
                }
            });
        }

        // Generate on click
        generateBtn.addEventListener('click', generatePassword);

        // Optional: Generate initial password on load
        generatePassword();

    </script>
</body>
</html>
